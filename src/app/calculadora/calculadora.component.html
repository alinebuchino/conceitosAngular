<div class="container">
    <div class="form-box">
        <form #frm="ngForm" (ngSubmit)="calcularResultado()">
            <h2>Calculadora</h2>
            <label for="numero1">Número 1</label>
            <input type="number" id="numero1" name="numero1" [(ngModel)]="numero1">

            <label for="numero2">Número 2</label>
            <input type="number" id="numero2" name="numero2" [(ngModel)]="numero2">
            <button type="submit">Calcular</button>
        </form>

        @if (resultado) {
        <div class="result-display">
            <p> Resultado: <span id="result"> {{resultado}}</span></p>
        </div>
        } @else {
        <div class="result-display">
            <p> Seu resultado aparecerá aqui</p>
        </div>
        }

        <!-- Outra forma de fazer o IF pelo CommonModule do Angular 

        <div class="result-display" *ngIf="resultado">
            <p>Seu resultado é {{resultado}} </p>
        </div>

        -->
    </div>
</div>
